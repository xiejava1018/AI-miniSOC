name: E2E Tests

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: [self-hosted, linux]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd src/frontend
          npm ci

      - name: Install Playwright browsers
        run: |
          cd src/frontend
          npx playwright install --with-deps chromium

      - name: Reset test database
        run: |
          echo "Resetting test database on 192.168.0.42..."
          cd src/frontend
          export PGPASSWORD='PostgreSQL@2026'
          psql -h 192.168.0.42 -U postgres -d AI-miniSOC-testdb -f tests/setup/test-seed.sql
        env:
          PGPASSWORD: 'PostgreSQL@2026'
        continue-on-error: true

      - name: Run E2E tests
        run: |
          cd src/frontend
          npm run test:e2e
        env:
          CI: true
          TEST_DATABASE_HOST: '192.168.0.42'
          TEST_DATABASE_PORT: '5432'
          TEST_DATABASE_USER: 'postgres'
          TEST_DATABASE_PASSWORD: 'PostgreSQL@2026'
          TEST_DATABASE_NAME: 'AI-miniSOC-testdb'
          TEST_API_BASE_URL: 'http://192.168.0.128:8000'
          TEST_FRONTEND_URL: 'http://192.168.0.128:5173'

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: src/frontend/playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: src/frontend/test-results/
          retention-days: 30

      - name: Upload test screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-screenshots
          path: src/frontend/test-results/
          retention-days: 30

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: src/frontend/test-results/results.xml
          check_name: E2E Test Results
        continue-on-error: true

      - name: Comment PR with test results
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request' && always()
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'src/frontend/playwright-report/index.html';

            if (fs.existsSync(reportPath)) {
              const report = fs.readFileSync(reportPath, 'utf8');
              // Extract summary or add comment
              console.log('Test report available in artifacts');
            }
        continue-on-error: true
